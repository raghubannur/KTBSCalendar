<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Calendar Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF7F0;
    --paper-raised: #F3EEE1;
    --ink: #1B1F2A;
    --ink-soft: #5B6270;
    --line: #D8D2C4;
    --line-strong: #C3BBA6;
    --stamp: #B23A2E;
    --stamp-soft: #B23A2E1a;
    --focus: #2E5C4E;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background-image: linear-gradient(var(--line) 1px, transparent 1px);
    background-size: 100% 2.1em;
    background-position: 0 7.4em;
  }

  .sheet {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }

  header.masthead {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 0.9rem;
    margin-bottom: 1.6rem;
  }

  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .masthead .kicker {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.3rem;
  }

  .masthead .today-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.5;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.6rem;
  }

  .nav-group {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }

  .nav-btn, .today-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    background: transparent;
    border: 1.5px solid var(--line-strong);
    border-radius: 3px;
    color: var(--ink);
    padding: 0.42rem 0.7rem;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .nav-btn:hover, .today-btn:hover {
    border-color: var(--ink);
    background: var(--paper-raised);
  }
  .nav-btn:focus-visible, .today-btn:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

  .range-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    margin-bottom: 1.8rem;
    letter-spacing: 0.02em;
  }

  .day-group { margin-bottom: 1.6rem; }

  .day-heading {
    display: flex;
    align-items: baseline;
    gap: 0.7rem;
    margin-bottom: 0.9rem;
  }

  .day-heading .dow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    width: 3.2rem;
    flex-shrink: 0;
  }

  .day-heading h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.25rem;
    margin: 0;
  }

  .stamp {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stamp);
    border: 1.5px solid var(--stamp);
    background: var(--stamp-soft);
    padding: 0.12rem 0.45rem;
    border-radius: 2px;
    transform: rotate(-3deg);
    display: inline-block;
  }

  .entries {
    border-left: 2px solid var(--line-strong);
    margin-left: 1.55rem;
    padding-left: 1.1rem;
  }

  .entries.no-events {
    border-left: 2px dashed var(--line);
    padding: 0.4rem 0 0.4rem 1.1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-soft);
    opacity: 0.75;
  }

  .entry {
    display: grid;
    grid-template-columns: 5.6rem 1fr;
    gap: 1rem;
    padding: 0.75rem 0;
    border-bottom: 1px dashed var(--line);
    position: relative;
  }
  .entry:last-child { border-bottom: none; }

  .entry::before {
    content: '';
    position: absolute;
    left: -1.44rem;
    top: 1.1rem;
    width: 7px;
    height: 7px;
    background: var(--paper);
    border: 2px solid var(--ink-soft);
    border-radius: 50%;
  }

  .entry .time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-soft);
    line-height: 1.5;
    white-space: nowrap;
  }
  .entry .time .end {
    display: block;
    opacity: 0.65;
    font-size: 0.72rem;
  }

  .entry .title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.05rem;
    line-height: 1.35;
  }

  .entry .meta {
    margin-top: 0.25rem;
    font-size: 0.85rem;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .entry .meta .loc::before {
    content: '⌖ ';
    opacity: 0.7;
  }

  .state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
  }
  .state.error { color: var(--stamp); }

  .state a.retry {
    display: inline-block;
    margin-top: 1rem;
    color: var(--ink);
    border: 1.5px solid var(--ink);
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    text-decoration: none;
    cursor: pointer;
    background: var(--paper);
  }

  .empty-illustration {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem;
    color: var(--line-strong);
    margin-bottom: 0.6rem;
  }

  @media (max-width: 480px) {
    .entry { grid-template-columns: 4.4rem 1fr; }
    .day-heading .dow { width: 2.6rem; }
  }
</style>
</head>
<body>

<div class="sheet">
  <header class="masthead">
    <div>
      <span class="kicker">Personal agenda</span>
      <h1>The Ledger</h1>
    </div>
    <div class="today-tag" id="todayTag"></div>
  </header>

  <div class="controls">
    <div class="nav-group">
      <button class="nav-btn" id="prevBtn" aria-label="Previous week">&larr; Prev week</button>
      <button class="today-btn" id="todayBtn">This week</button>
      <button class="nav-btn" id="nextBtn" aria-label="Next week">Next week &rarr;</button>
    </div>
  </div>

  <div class="range-label" id="rangeLabel"></div>

  <div id="content">
    <div class="state" id="stateBox">Loading entries&hellip;</div>
  </div>
</div>

<script>
  const ENDPOINT = 'https://script.google.com/macros/s/AKfycbwhtW83oBFp4ttPIqYpyauOpmXRDiR3zpZUyvo-StzJvcmEltVaLSEYSa3EbAV8XFLOrA/exec';

  let currentOffset = 0;
  const contentEl = document.getElementById('content');
  const rangeLabelEl = document.getElementById('rangeLabel');
  const todayTagEl = document.getElementById('todayTag');

  function formatTodayTag() {
    const now = new Date();
    todayTagEl.innerHTML = now.toLocaleDateString(undefined, { weekday: 'short' }) + '<br>' +
      now.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function truncate(str, n) {
    return str.length > n ? str.slice(0, n).trim() + '…' : str;
  }

  function renderWeek(data) {
    rangeLabelEl.textContent = data.weekLabel || '';

    if (!data.days || !data.days.length) {
      contentEl.innerHTML = `
        <div class="state">
          <div class="empty-illustration">—</div>
          Nothing on the ledger for this stretch.
        </div>`;
      return;
    }

    let html = '';
    data.days.forEach(day => {
      html += `<div class="day-group">
        <div class="day-heading">
          <span class="dow">${escapeHtml(day.dayName)}</span>
          <h2>${escapeHtml(day.date)}</h2>
          ${day.isToday ? '<span class="stamp">Today</span>' : ''}
        </div>`;

      if (!day.events || !day.events.length) {
        html += `<div class="entries no-events">No entries</div>`;
      } else {
        html += `<div class="entries">`;
        day.events.forEach(ev => {
          const metaParts = [];
          if (ev.loc) metaParts.push(`<span class="loc">${escapeHtml(ev.loc)}</span>`);
          if (ev.desc) metaParts.push(escapeHtml(truncate(ev.desc, 140)));

          html += `<div class="entry">
            <div class="time">${escapeHtml(ev.time || '')}<span class="end">${escapeHtml(ev.end || '')}</span></div>
            <div>
              <div class="title">${escapeHtml(ev.title || 'Untitled')}</div>
              ${metaParts.length ? `<div class="meta">${metaParts.join(' &middot; ')}</div>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
      }

      html += `</div>`;
    });

    contentEl.innerHTML = html;
  }

  async function loadEvents() {
    contentEl.innerHTML = `<div class="state">Loading entries&hellip;</div>`;
    rangeLabelEl.textContent = '';

    const url = new URL(ENDPOINT);
    url.searchParams.set('week', currentOffset);

    try {
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error('Request failed with status ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderWeek(data);
    } catch (err) {
      contentEl.innerHTML = `
        <div class="state error">
          Couldn't reach the calendar.<br>${escapeHtml(err.message)}
          <br><a class="retry" id="retryLink">Try again</a>
        </div>`;
      document.getElementById('retryLink').addEventListener('click', loadEvents);
    }
  }

  document.getElementById('prevBtn').addEventListener('click', () => { currentOffset -= 1; loadEvents(); });
  document.getElementById('nextBtn').addEventListener('click', () => { currentOffset += 1; loadEvents(); });
  document.getElementById('todayBtn').addEventListener('click', () => { currentOffset = 0; loadEvents(); });

  formatTodayTag();
  loadEvents();
</script>

</body>
</html>
